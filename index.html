<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vaša Sauna - AI asistent & konfigurátor sauny</title>
<!-- Pasteable verzia: všetky preview obrázky sú vložené priamo v tomto HTML ako WebP data URI. -->
<script defer src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --vs-charcoal:#17120E;
  --vs-espresso:#26180F;
  --vs-brown:#57351F;
  --vs-copper:#C47A2C;
  --vs-copper-2:#A85F1E;
  --vs-amber:#EDB65D;
  --vs-cream:#FFF7EA;
  --vs-sand:#F3E2C8;
  --vs-paper:#FFFFFF;
  --vs-muted:#7F6F60;
  --vs-line:#E8D2B4;
  --vs-soft:#FFF1DC;
  --vs-shadow:0 22px 70px rgba(23,18,14,.28);
  --vs-font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:transparent!important;font-family:var(--vs-font)!important}
#vs-teaser{position:fixed;right:18px;bottom:96px;z-index:99998;max-width:302px;background:rgba(255,247,234,.96);color:var(--vs-charcoal);border:1px solid rgba(196,122,44,.34);box-shadow:0 16px 44px rgba(23,18,14,.18);border-radius:18px;padding:13px 40px 13px 15px;font:700 13px/1.35 var(--vs-font);opacity:0;transform:translateY(10px) scale(.96);pointer-events:none;transition:all .28s ease}
#vs-teaser.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
#vs-teaser:after{content:"";position:absolute;right:34px;bottom:-8px;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid rgba(255,247,234,.96)}
#vs-teaser button{position:absolute;right:8px;top:7px;width:24px;height:24px;border:0;background:rgba(38,24,15,.08);color:var(--vs-muted);border-radius:50%;font-size:15px;cursor:pointer}
#vasasauna-bubble{position:fixed;right:18px;bottom:18px;z-index:100000;width:70px;height:70px;border:0;border-radius:22px;background:radial-gradient(circle at 30% 20%,#FFDCA0 0,#C47A2C 44%,#6B3B1F 100%);box-shadow:0 16px 36px rgba(196,122,44,.38),0 0 0 8px rgba(196,122,44,.12);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .25s cubic-bezier(.2,1.4,.2,1),box-shadow .25s;overflow:hidden}
#vasasauna-bubble:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 20px 46px rgba(196,122,44,.48),0 0 0 10px rgba(196,122,44,.12)}
#vasasauna-bubble.open{opacity:0;pointer-events:none;transform:scale(.84)}
.vs-bubble-mark{position:relative;width:48px;height:48px;border-radius:16px;background:rgba(23,18,14,.92);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.12)}
.vs-bubble-mark svg{width:30px;height:30px;fill:#FFD18A}
.vs-dot{position:absolute;right:8px;top:8px;width:13px;height:13px;border-radius:50%;background:#F0522D;border:3px solid #FFF7EA;box-shadow:0 0 0 0 rgba(240,82,45,.35);animation:vsPulse 1.8s infinite}
@keyframes vsPulse{50%{box-shadow:0 0 0 8px rgba(240,82,45,0)}}
#vasasauna-chat{position:fixed;right:18px;bottom:98px;z-index:99999;width:462px;height:min(744px,calc(100dvh - 116px));max-height:calc(100dvh - 116px);background:linear-gradient(180deg,#FFFDF9 0%,#FFF7EA 100%);border:1px solid rgba(196,122,44,.26);border-radius:28px;box-shadow:var(--vs-shadow);display:flex;flex-direction:column;overflow:hidden;opacity:0;pointer-events:none;transform:translateY(24px) scale(.92);transform-origin:bottom right;transition:opacity .22s,transform .35s cubic-bezier(.2,1.25,.2,1)}
#vasasauna-chat.visible{opacity:1;pointer-events:auto;transform:translateY(0) scale(1)}
.vs-header{position:relative;padding:15px 16px;background:linear-gradient(135deg,#17120E 0%,#2B1B12 58%,#5D351D 100%);color:#fff;display:flex;align-items:center;gap:12px;overflow:hidden}
.vs-header:before{content:"";position:absolute;right:-52px;top:-64px;width:160px;height:160px;background:radial-gradient(circle,rgba(237,182,93,.36),rgba(237,182,93,0) 66%)}
.vs-avatar{position:relative;z-index:1;width:52px;height:52px;border-radius:17px;background:linear-gradient(145deg,#FFF7EA,#D59644);display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.35),0 8px 18px rgba(0,0,0,.22);flex:0 0 auto}
.vs-avatar svg{width:33px;height:33px;fill:#17120E}
.vs-head-text{position:relative;z-index:1;min-width:0;flex:1}
.vs-title{font-size:15.5px;font-weight:900;letter-spacing:-.25px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vs-sub{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.72);font-size:11.5px;font-weight:650;margin-top:2px}
.vs-online{width:7px;height:7px;border-radius:50%;background:#38D47A;box-shadow:0 0 0 5px rgba(56,212,122,.13)}
.vs-head-actions{position:relative;z-index:1;display:flex;gap:6px}
.vs-icon-btn{width:34px;height:34px;border:1px solid rgba(255,255,255,.12);border-radius:12px;background:rgba(255,255,255,.08);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s}
.vs-icon-btn:hover{background:rgba(255,255,255,.15)}
.vs-icon-btn svg{width:17px;height:17px;fill:currentColor}
.vs-top{padding:12px 14px;background:#FFFDF9;border-bottom:1px solid rgba(232,210,180,.7)}
.vs-config-cta{width:100%;border:1px solid rgba(196,122,44,.36);border-radius:18px;background:linear-gradient(135deg,#FFF4E0 0%,#fff 50%,#F4DEC0 100%);box-shadow:0 10px 24px rgba(196,122,44,.14);padding:12px 13px;display:grid;grid-template-columns:46px 1fr auto;gap:12px;align-items:center;text-align:left;cursor:pointer;font-family:var(--vs-font);transition:.2s}
.vs-config-cta:hover{transform:translateY(-1px);border-color:var(--vs-copper);box-shadow:0 14px 30px rgba(196,122,44,.2)}
.vs-config-ico{width:46px;height:46px;border-radius:15px;background:linear-gradient(145deg,#C47A2C,#6B3B1F);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 8px 16px rgba(196,122,44,.28)}
.vs-config-ico svg{width:25px;height:25px;fill:currentColor}
.vs-config-title{display:block;font-size:14px;font-weight:900;color:var(--vs-charcoal);line-height:1.15}
.vs-config-sub{display:block;font-size:11.5px;font-weight:650;color:var(--vs-muted);line-height:1.35;margin-top:2px}
.vs-config-arrow{font-size:22px;font-weight:900;color:var(--vs-copper)}
.vs-messages{flex:1;min-height:0;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;background:radial-gradient(circle at 12% 0%,rgba(237,182,93,.13),transparent 34%),linear-gradient(180deg,#FFFDF9,#FFF9EE)}
.vs-messages::-webkit-scrollbar,.vs-calc::-webkit-scrollbar{width:5px}
.vs-messages::-webkit-scrollbar-thumb,.vs-calc::-webkit-scrollbar-thumb{background:#E1C399;border-radius:999px}
.vs-row{display:flex;gap:8px;align-items:flex-end;animation:vsMsg .18s ease both}
@keyframes vsMsg{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.vs-row.user{justify-content:flex-end}
.vs-mini-av{width:30px;height:30px;flex:0 0 auto;border-radius:11px;background:var(--vs-charcoal);display:flex;align-items:center;justify-content:center;color:var(--vs-amber)}
.vs-mini-av svg{width:19px;height:19px;fill:currentColor}
.vs-row.user .vs-mini-av{display:none}
.vs-msg{max-width:82%;padding:10px 13px;border-radius:16px;font:500 13.5px/1.5 var(--vs-font);box-shadow:0 2px 8px rgba(23,18,14,.05)}
.vs-msg.bot{background:#fff;border:1px solid rgba(232,210,180,.7);color:#2B2119;border-bottom-left-radius:6px}
.vs-msg.user{background:linear-gradient(135deg,#C47A2C,#6B3B1F);color:#fff;font-weight:650;border-bottom-right-radius:6px}
.vs-msg b{font-weight:850}
.vs-msg ul{padding-left:17px;margin:6px 0 0}
.vs-msg li{margin:2px 0}
.vs-typing{display:none;align-items:flex-end;gap:8px;padding:0 14px 10px;background:#FFF9EE}
.vs-typing.show{display:flex}
.vs-typing-bubble{display:flex;gap:4px;align-items:center;background:#fff;border:1px solid rgba(232,210,180,.7);border-radius:16px;border-bottom-left-radius:6px;padding:12px 16px}
.vs-typing-bubble span{width:6px;height:6px;border-radius:50%;background:var(--vs-copper);opacity:.35;animation:vsDot 1.25s infinite}
.vs-typing-bubble span:nth-child(2){animation-delay:.15s}
.vs-typing-bubble span:nth-child(3){animation-delay:.3s}
@keyframes vsDot{40%{opacity:1;transform:translateY(-4px)}}
.vs-chips{display:flex;gap:7px;flex-wrap:wrap;padding:0 14px 12px;background:#FFF9EE}
.vs-chip{border:1px solid rgba(196,122,44,.25);background:#fff;color:var(--vs-charcoal);border-radius:999px;padding:7px 11px;font:750 12px var(--vs-font);cursor:pointer;transition:.2s}
.vs-chip:hover{border-color:var(--vs-copper);color:var(--vs-copper);transform:translateY(-1px)}
.vs-inputbar{display:flex;gap:8px;align-items:center;padding:12px 14px;background:#fff;border-top:1px solid rgba(232,210,180,.75)}
.vs-input{flex:1;height:42px;border:1.5px solid var(--vs-line);border-radius:14px;background:#FFF9EE;color:var(--vs-charcoal);font:600 13.5px var(--vs-font);padding:0 13px;outline:none}
.vs-input:focus{border-color:var(--vs-copper);background:#fff;box-shadow:0 0 0 4px rgba(196,122,44,.11)}
.vs-send{width:42px;height:42px;border:0;border-radius:14px;background:linear-gradient(135deg,#C47A2C,#6B3B1F);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 18px rgba(196,122,44,.22);transition:.2s}
.vs-send:hover{transform:translateY(-1px)}
.vs-send svg{width:18px;height:18px;fill:currentColor}
.vs-contactbar{display:flex;gap:7px;padding:10px 14px;background:#fff;border-top:1px solid rgba(232,210,180,.75)}
.vs-contact{flex:1;text-decoration:none;color:var(--vs-charcoal);border:1px solid var(--vs-line);background:#fff;border-radius:14px;display:flex;justify-content:center;align-items:center;gap:7px;padding:9px 6px;font:850 11.5px var(--vs-font);transition:.2s}
.vs-contact:hover{border-color:var(--vs-copper);transform:translateY(-1px);box-shadow:0 8px 18px rgba(23,18,14,.08)}
.vs-contact i{width:24px;height:24px;border-radius:9px;background:#FFF0D8;display:flex;align-items:center;justify-content:center;color:var(--vs-copper);font-style:normal}
.vs-calc{display:none;flex:1;min-height:0;overflow-y:auto;padding:14px 16px 16px;background:linear-gradient(180deg,#FFFDF9,#FFF5E6)}
#vasasauna-chat.calc-open .vs-messages,#vasasauna-chat.calc-open .vs-typing,#vasasauna-chat.calc-open .vs-chips,#vasasauna-chat.calc-open .vs-inputbar,#vasasauna-chat.calc-open .vs-contactbar,#vasasauna-chat.calc-open .vs-top{display:none}
#vasasauna-chat.calc-open .vs-calc{display:block}
.vs-calc-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
.vs-calc-head h3{margin:0;color:var(--vs-charcoal);font-size:16px;font-weight:950;letter-spacing:-.3px}
.vs-calc-close{border:1px solid var(--vs-line);background:#fff;width:34px;height:34px;border-radius:12px;cursor:pointer;color:var(--vs-muted);font-size:20px;line-height:1}
.vs-progress{display:flex;align-items:center;gap:9px;margin-bottom:12px;padding:7px;border:1px solid rgba(232,210,180,.78);border-radius:999px;background:rgba(255,255,255,.75)}
.vs-back{width:31px;height:31px;border-radius:50%;border:1px solid var(--vs-line);background:#fff;color:var(--vs-charcoal);font-size:18px;font-weight:900;cursor:pointer}
.vs-back:disabled{opacity:.35;cursor:not-allowed}
.vs-bar{height:8px;flex:1;border-radius:999px;background:#EDD6B2;overflow:hidden}
.vs-bar-fill{height:100%;width:0;background:linear-gradient(90deg,#6B3B1F,#C47A2C,#EDB65D);border-radius:999px;transition:width .3s}
.vs-count{font-size:11px;font-weight:900;color:var(--vs-copper);background:#fff;border:1px solid var(--vs-line);border-radius:999px;padding:5px 9px}
.vs-preview{position:relative;border:1px solid rgba(196,122,44,.25);border-radius:22px;background:#fff;overflow:hidden;box-shadow:0 10px 24px rgba(23,18,14,.08);margin-bottom:13px}
.vs-preview-photo{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.24;filter:saturate(1.1) contrast(1.05)}
.vs-preview:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(23,18,14,.82) 0%,rgba(23,18,14,.4) 38%,rgba(255,247,234,.2) 100%)}
.vs-preview-inner{position:relative;z-index:2;padding:13px;display:grid;grid-template-columns:1fr 1.1fr;gap:12px;align-items:stretch;min-height:156px}
.vs-preview-copy{display:flex;flex-direction:column;justify-content:space-between;gap:8px;color:#fff}
.vs-kicker{font-size:10px;text-transform:uppercase;letter-spacing:.9px;font-weight:950;color:#FFD18A}
.vs-preview-title{font-size:20px;line-height:1.05;font-weight:950;letter-spacing:-.7px}
.vs-preview-meta{display:flex;gap:6px;flex-wrap:wrap}
.vs-pill{display:inline-flex;align-items:center;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border-radius:999px;padding:5px 8px;font-size:10.5px;font-weight:850;color:#fff}
.vs-visual{position:relative;min-height:130px;border-radius:17px;background:linear-gradient(180deg,#2C2018 0,#4B2F1B 100%);border:1px solid rgba(255,255,255,.14);overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}
.vs-wall{position:absolute;inset:0;background:repeating-linear-gradient(0deg,var(--wood,#B76C2D) 0 16px,var(--wood2,#8C4C22) 16px 18px);opacity:.94}
.vs-floor{position:absolute;left:0;right:0;bottom:0;height:34%;background:repeating-linear-gradient(90deg,#E6B46E 0 24px,#C98C42 24px 27px);transform:skewX(-10deg);transform-origin:bottom left}
.vs-bench{position:absolute;left:12%;right:8%;bottom:31%;height:18px;background:#E9BD78;border-radius:7px;box-shadow:0 21px 0 rgba(233,189,120,.95),0 42px 0 rgba(233,189,120,.9)}
.vs-led{position:absolute;left:8%;right:8%;top:36%;height:4px;background:var(--led,rgba(255,209,138,.75));box-shadow:0 0 12px var(--led,rgba(255,209,138,.75));border-radius:999px;opacity:var(--led-op,.7)}
.vs-glass{position:absolute;right:7%;top:13%;width:var(--glassw,30%);height:72%;border-radius:10px;background:linear-gradient(135deg,rgba(142,95,56,.22),rgba(255,255,255,.23));border:2px solid rgba(255,218,166,.65);box-shadow:inset 0 0 18px rgba(255,255,255,.1)}
.vs-stove{position:absolute;right:13%;bottom:10%;width:38px;height:44px;border-radius:12px 12px 8px 8px;background:linear-gradient(180deg,#D8D0C3,#57483B);box-shadow:0 8px 14px rgba(0,0,0,.18)}
.vs-stove:before{content:"";position:absolute;left:5px;right:5px;top:-9px;height:17px;border-radius:50%;background:radial-gradient(circle at 25% 40%,#1B1714 0 5px,#5A5650 6px 10px,#24211E 11px)}
.vs-infra{display:none;position:absolute;left:13%;top:20%;width:22px;height:66px;background:#1E1712;border:3px solid #DEB175;border-radius:10px;box-shadow:36px 0 0 #1E1712,72px 0 0 #1E1712}
.vs-salt{display:none;position:absolute;left:8%;top:12%;width:34px;height:78px;background:repeating-linear-gradient(0deg,#FFE5A8 0 12px,#D58631 12px 14px);box-shadow:0 0 20px rgba(255,195,100,.75);border-radius:7px}
.vs-terrace{display:none;position:absolute;left:0;right:0;bottom:0;height:18%;background:repeating-linear-gradient(90deg,#9F5D26 0 18px,#7E431A 18px 20px);opacity:.92}
.vs-room{display:none;position:absolute;left:3%;top:10%;bottom:25%;width:28%;border:2px solid rgba(255,218,166,.35);border-radius:11px;background:rgba(23,18,14,.18)}
.vs-type-infra .vs-stove{display:none}
.vs-type-infra .vs-infra{display:block}
.vs-type-combi .vs-infra{display:block;left:10%;transform:scale(.82);transform-origin:left top}
.vs-model-silver .vs-room,.vs-model-platinum .vs-room{display:block}
.vs-model-gold .vs-terrace,.vs-model-platinum .vs-terrace{display:block}
.vs-has-salt .vs-salt{display:block}
.vs-step-title{font-size:17px;font-weight:950;color:var(--vs-charcoal);letter-spacing:-.35px;margin-bottom:4px}
.vs-step-sub{font-size:12px;line-height:1.45;color:var(--vs-muted);font-weight:650;margin-bottom:12px}
.vs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.vs-grid.two{grid-template-columns:repeat(2,1fr)}
.vs-card{border:1.5px solid var(--vs-line);background:#fff;border-radius:17px;overflow:hidden;cursor:pointer;transition:.2s;position:relative;box-shadow:0 5px 14px rgba(23,18,14,.05)}
.vs-card:hover{transform:translateY(-2px);border-color:var(--vs-copper)}
.vs-card.selected{border-color:var(--vs-copper);box-shadow:0 0 0 3px rgba(196,122,44,.13),0 10px 22px rgba(196,122,44,.14)}
.vs-card.selected:after{content:"✓";position:absolute;right:8px;top:8px;width:23px;height:23px;border-radius:50%;background:linear-gradient(135deg,#C47A2C,#6B3B1F);color:#fff;font-size:13px;font-weight:950;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 13px rgba(23,18,14,.22)}
.vs-card-img{height:72px;background-size:cover;background-position:center}
.vs-card-body{padding:9px 10px}
.vs-card-name{font-size:12.5px;font-weight:950;color:var(--vs-charcoal);line-height:1.15}
.vs-card-desc{font-size:10.5px;line-height:1.3;color:var(--vs-muted);font-weight:650;margin-top:3px}
.vs-card-price{font-size:11px;font-weight:950;color:var(--vs-copper);margin-top:5px}
.vs-choice-list{display:flex;flex-direction:column;gap:8px}
.vs-choice{border:1.5px solid var(--vs-line);background:#fff;border-radius:15px;padding:11px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;transition:.2s}
.vs-choice:hover,.vs-choice.selected{border-color:var(--vs-copper);background:#FFF8EC}
.vs-check{width:20px;height:20px;border:2px solid #C7A87E;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;margin-top:1px}
.vs-choice.selected .vs-check{background:var(--vs-copper);border-color:var(--vs-copper)}
.vs-choice.selected .vs-check:after{content:"";width:9px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(1px,-1px)}
.vs-choice-swatch{width:18px;height:18px;border-radius:999px;display:inline-block;flex:0 0 18px;margin-top:1px;border:1.5px solid rgba(23,18,14,.12);box-shadow:inset 0 1px 1px rgba(255,255,255,.5),0 2px 5px rgba(23,18,14,.06)}
.vs-choice-main{flex:1;min-width:0}
.vs-choice-name{font-size:13px;font-weight:900;color:var(--vs-charcoal);line-height:1.25}
.vs-choice-desc{font-size:11px;color:var(--vs-muted);font-weight:650;line-height:1.35;margin-top:2px}
.vs-choice-price{font-size:11.5px;font-weight:950;color:var(--vs-copper);white-space:nowrap}
.vs-summary{border:1px solid rgba(196,122,44,.28);border-radius:20px;background:linear-gradient(145deg,#FFF9EE,#fff);padding:14px;box-shadow:0 10px 24px rgba(23,18,14,.06)}
.vs-price-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:950;color:var(--vs-copper)}
.vs-price{font-size:31px;line-height:1;font-weight:950;letter-spacing:-1px;color:var(--vs-charcoal);margin-top:4px}
.vs-price small{font-size:15px;color:var(--vs-copper);letter-spacing:0}
.vs-note{font-size:11px;line-height:1.45;color:var(--vs-muted);font-weight:650;margin-top:7px}
.vs-breakdown{margin-top:12px;border-top:1px dashed var(--vs-line);padding-top:10px}
.vs-breakrow{display:flex;justify-content:space-between;gap:12px;font-size:12px;line-height:1.45;color:var(--vs-muted);font-weight:650;padding:3px 0}
.vs-breakrow b{color:var(--vs-charcoal)}
.vs-form{margin-top:12px;display:grid;gap:8px}
.vs-form input,.vs-form textarea{width:100%;border:1.5px solid var(--vs-line);background:#fff;border-radius:14px;padding:11px 12px;font:650 13px var(--vs-font);outline:none;color:var(--vs-charcoal)}
.vs-form textarea{height:70px;resize:none;line-height:1.45}
.vs-form input:focus,.vs-form textarea:focus{border-color:var(--vs-copper);box-shadow:0 0 0 4px rgba(196,122,44,.11)}
.vs-form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.vs-actions{display:flex;gap:8px;margin-top:12px}
.vs-btn{flex:1;border:0;border-radius:15px;background:linear-gradient(135deg,#C47A2C,#6B3B1F);color:#fff;font:900 13px var(--vs-font);padding:12px 14px;cursor:pointer;box-shadow:0 10px 20px rgba(196,122,44,.24);transition:.2s}

  function euro(n){ return Math.round(n).toLocaleString('sk-SK') + ' €'; }
  function esc(s){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function pct(n){ return Math.max(0,Math.min(100,n)).toFixed(2).replace(/\.00$/,'') + '%'; }
  function numPct(v){ return parseFloat(String(v).replace('%','')) || 0; }
  function scaleBox(box, factor){
    const l=numPct(box.l), t=numPct(box.t), w=numPct(box.w), h=numPct(box.h);
    const cx=l+w/2, cy=t+h/2;
    const nw=w*factor, nh=h*factor;
    return {l:pct(cx-nw/2),t:pct(cy-nh/2),w:pct(nw),h:pct(nh),r:box.r};
  }
  function getPreviewSource(type=state.choice.type, place=state.choice.place, size=state.choice.size){

    return VISUAL_LAYOUTS[`${type}_${place}`] || VISUAL_LAYOUTS.finska_interier;
  }
  function preload(src){
    if(!src || preloaded[src]) return;
    const img = new Image();
    img.decoding = 'async';
    img.src = src;
    preloaded[src] = img;
  }
  function preloadLikely(){
    const c = state.choice;
    preload(getPreviewSource(c.type,c.place,c.size));
    Object.keys(DATA.sizes).forEach(size=>preload(getPreviewSource(c.type,c.place,size)));
    if(state.step <= 1){ Object.keys(DATA.places).forEach(place=>preload(getPreviewSource(c.type,place,c.size))); }
    if(state.step === 0){ Object.keys(DATA.types).forEach(type=>preload(getPreviewSource(type,c.place,c.size))); }
  }

  function compute(){
    const c = state.choice;
    const type = DATA.types[c.type];
    const place = DATA.places[c.place];
    const size = DATA.sizes[c.size];
    const wood = DATA.woods[c.wood];
    const glass = DATA.glass[c.glass];
    const options = c.options.reduce((sum,id)=>sum + (DATA.options[id]?.price || 0),0);
    const subtotal = (type.base * place.mult * size.mult * wood.mult) + glass.price + options;
    const install = c.place === 'exterier' ? 980 : (c.place === 'zabudovana' ? 820 : 690);
    const total = subtotal + install;
    return {type,place,size,wood,glass,options,subtotal:Math.round(subtotal),install,total:Math.round(total),vat:Math.round(total*1.23)};
  }

  function previewHtml(){

    const saltBox = scaleBox(layout.salt, factor);
    const ledBox = scaleBox(layout.led, factor);

    const led = c.options.includes('led');

    const style = `${cssBoxVars('wood',woodBox)}${cssBoxVars('glass',glassBox)}${cssBoxVars('salt',saltBox)}${cssBoxVars('led',ledBox)}${cssBoxVars('wifi',wifiBox)}--wood-color:${wood.tone};--wood-opacity:${wood.toneOpacity};--wood-blend:${wood.toneBlend};--glass-color:${glass.tint};--glass-opacity:${glass.opacity};--glass-scale:${glass.scale};`;

    document.head.appendChild(extraStyle);
  })();

  const ENHANCED_WOOD_STEP_PHOTOS = {
    interier:{
      medium:{
        smrek:"img-02.webp",
        thermo:"img-02.webp",
        osika:"img-02.webp",
        premium:"img-02.webp"
      }
    },
    exterier:{
      medium:{
        smrek:"img-02.webp",
        thermo:"img-02.webp",
        osika:"img-02.webp",
        premium:"img-02.webp"
      }
    },
    zabudovana:{
      medium:{
        smrek:"img-02.webp",
        thermo:"img-02.webp",
        osika:"img-02.webp",
        premium:"img-02.webp"
      }
    }
  };

  const ENHANCED_GLASS_STEP_PHOTOS = {
    interier:{
      medium:{
        standard:"img-02.webp",
        panorama:"img-02.webp"
      }
    },
    exterier:{
      medium:{
        standard:"img-02.webp",
        panorama:"img-02.webp"
      }
    },
    zabudovana:{
      medium:{
        standard:"img-02.webp",
        panorama:"img-02.webp"
      }
    }
  };

  function getEnhancedWoodPhotoSource(place=state.choice.place, size=state.choice.size, wood=state.choice.wood){
    return ((((ENHANCED_WOOD_STEP_PHOTOS[place]||{})[size]||{})[wood]) || null);
  }

  function getEnhancedGlassPhotoSource(place=state.choice.place, size=state.choice.size, glass=state.choice.glass){
    return ((((ENHANCED_GLASS_STEP_PHOTOS[place]||{})[size]||{})[glass]) || null);
  }

  function getStepPhotoSource(){
    const c = state.choice;
    if(c.size !== 'medium') return null;
    if(state.step >= 4) return getEnhancedGlassPhotoSource(c.place,c.size,c.glass) || getEnhancedWoodPhotoSource(c.place,c.size,c.wood) || null;
    if(state.step === 3) return getEnhancedWoodPhotoSource(c.place,c.size,c.wood) || null;
    return null;
  }

  function getWoodPhotoSource(){
    return getEnhancedWoodPhotoSource();
  }

  function preloadLikely(){
    const c = state.choice;
    preload(getPreviewSource(c.type,c.place,c.size));
    preload(getStepPhotoSource());
    Object.keys(DATA.sizes).forEach(size=>preload(getPreviewSource(c.type,c.place,size)));
    if(state.step <= 1){ Object.keys(DATA.places).forEach(place=>preload(getPreviewSource(c.type,place,c.size))); }
    if(state.step === 0){ Object.keys(DATA.types).forEach(type=>preload(getPreviewSource(type,c.place,c.size))); }
    if(state.step === 3){ Object.keys(DATA.woods).forEach(wood=>preload(getEnhancedWoodPhotoSource(c.place,c.size,wood))); }
    if(state.step >= 4){
      Object.keys(DATA.glass).forEach(glass=>preload(getEnhancedGlassPhotoSource(c.place,c.size,glass)));
      Object.keys(DATA.woods).forEach(wood=>preload(getEnhancedWoodPhotoSource(c.place,c.size,wood)));
    }
  }

  function previewHtml(){
    const c = state.choice;
    const defaultSrc = getPreviewSource();
    const stepPhoto = getStepPhotoSource();
    const woodPhoto = state.step === 3 ? getEnhancedWoodPhotoSource() : null;
    const glassPhoto = state.step >= 4 ? getEnhancedGlassPhotoSource() : null;
    const src = stepPhoto || defaultSrc;
    const wood = DATA.woods[c.wood];
    const glass = DATA.glass[c.glass];
    const layout = getVisualLayout();
    const factor = DATA.sizes[c.size].visual || 1;
    const woodBox = scaleBox(layout.wood, factor);
    const glassBox = scaleBox(layout.glass, factor);
    const saltBox = scaleBox(layout.salt, factor);
    const ledBox = scaleBox(layout.led, factor);
    const wifiBox = scaleBox(layout.wifi, factor);
    const led = c.options.includes('led');
    const salt = c.options.includes('salt');
    const wifi = c.options.includes('wifi');
    const useWoodOverlay = !woodPhoto && !glassPhoto;
    const useGlassOverlay = !glassPhoto;
    const glassOpacity = c.glass === 'bronze' ? 0.20 : (c.glass === 'panorama' ? 0.12 : 0.08);
    const style = `${cssBoxVars('wood',woodBox)}${cssBoxVars('glass',glassBox)}${cssBoxVars('salt',saltBox)}${cssBoxVars('led',ledBox)}${cssBoxVars('wifi',wifiBox)}--wood-color:${wood.tone};--wood-opacity:${wood.toneOpacity};--wood-blend:${wood.toneBlend};--glass-color:${glass.tint};--glass-opacity:${glassOpacity};--glass-scale:${glass.scale};`;
    return `<div class="vs-preview modern"><div class="vs-preview-art" style="${style}"><span class="vs-photo" aria-hidden="true" style="background-image:url('${src}')"></span>${useWoodOverlay?'<span class="vs-wood-layer"></span>':''}${useGlassOverlay?'<span class="vs-glass-layer"></span>':''}${salt?'<span class="vs-salt-layer"></span>':''}${led?'<span class="vs-led-layer"></span>':''}${wifi?'<span class="vs-wifi-layer"></span>':''}</div></div>`;
  }


  /* --- FINAL UX FIX: stable main preview, no size/wood/glass/add-on image swapping --- */
  function getStableMainPreviewSource(){
    const c = state.choice;
    return getPreviewSource(c.type, c.place, 'medium') || getPreviewSource(c.type, c.place, c.size);
  }

  function getStepPhotoSource(){
    return null;
  }

  function getWoodPhotoSource(){
    return null;
  }

  function preloadLikely(){
    const c = state.choice;
    preload(getStableMainPreviewSource());
    if(state.step <= 1){ Object.keys(DATA.places).forEach(place=>preload(getPreviewSource(c.type,place,'medium'))); }
    if(state.step === 0){ Object.keys(DATA.types).forEach(type=>preload(getPreviewSource(type,c.place,'medium'))); }
  }

  function previewHtml(){
    const src = getStableMainPreviewSource();
    return `<div class="vs-preview modern"><div class="vs-preview-art"><span class="vs-photo" aria-hidden="true" style="background-image:url('${src}')"></span></div></div>`;
  }


  /* --- MATERIAL PREVIEW FIX: wood/glass show only material image, calculator functions preserved --- */
  (function(){
    DATA.woods.smrek.desc = 'Čistý prirodzený vzhľad.';
    DATA.woods.thermo.desc = 'Tmavší wellness tón.';
    DATA.woods.osika.desc = 'Svetlejší čistý dojem.';
    DATA.woods.premium.desc = 'Kontrastnejšie prémiové ladenie.';
    DATA.glass.standard.desc = 'Klasické číre sklo.';
    DATA.glass.panorama.desc = 'Otvorenejší presklený vzhľad.';
    DATA.glass.bronze.desc = 'Elegantný teplejší tón presklenia.';
    DATA.options.led.desc = 'Ambientné svetelné pásy.';
    DATA.options.salt.desc = 'Soľný prvok do interiéru sauny.';
    DATA.options.wifi.desc = 'Ovládanie cez Wi‑Fi.';
    const style = document.createElement('style');
    style.textContent = `
      .vs-sample-art{position:absolute;inset:0;background-size:cover;background-position:center;display:block}
      .vs-sample-art.wood{filter:saturate(1.04) contrast(1.03)}
      .vs-sample-art.glass{filter:saturate(1.03) contrast(1.02)}
    `;
    document.head.appendChild(style);
  })();

  function svgDataUri(svg){ return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg); }

  const WOOD_SAMPLE_IMAGES = {
    smrek: 'img-41.webp',
    thermo: 'img-42.webp',
    osika: 'img-43.webp',
    premium: 'img-44.webp'
  };

  const GLASS_SAMPLE_IMAGES = {
    standard: 'img-45.webp',
    panorama: 'img-46.webp',
    bronze: 'img-47.webp'
  };

  function previewHtml(){
    const src = getStableMainPreviewSource();
    const c = state.choice;
    if(state.step === 3){
      const sample = WOOD_SAMPLE_IMAGES[c.wood] || WOOD_SAMPLE_IMAGES.smrek;
      return `<div class="vs-preview modern"><div class="vs-preview-art"><span class="vs-sample-art wood" aria-hidden="true" style="background-image:url('${sample}')"></span></div></div>`;
    }
    if(state.step === 4){
      const sample = GLASS_SAMPLE_IMAGES[c.glass] || GLASS_SAMPLE_IMAGES.standard;
      return `<div class="vs-preview modern"><div class="vs-preview-art"><span class="vs-sample-art glass" aria-hidden="true" style="background-image:url('${sample}')"></span></div></div>`;
    }
    return `<div class="vs-preview modern"><div class="vs-preview-art"><span class="vs-photo" aria-hidden="true" style="background-image:url('${src}')"></span></div></div>`;
  }

  function stepHtml(){
    const s = state.step;
    if(s===0) return `<div class="vs-step-title">1. Vyberte typ sauny</div><div class="vs-step-sub">Najprv vyberte základný typ sauny.</div>${cardGrid(typeCards(),'type')}`;
    if(s===1) return `<div class="vs-step-title">2. Prostredie</div><div class="vs-step-sub">Vyberte, či bude sauna v interiéri, exteriéri alebo zabudovaná.</div>${cardGrid(placeCards(),'place')}`;
    if(s===2) return `<div class="vs-step-title">3. Veľkosť sauny</div><div class="vs-step-sub">Vyberte veľkosť podľa počtu osôb na sedenie.</div>${choiceList(DATA.sizes,'size')}`;
    if(s===3) return `<div class="vs-step-title">4. Materiál a farba dreva</div><div class="vs-step-sub">Vyberte prevedenie dreva.</div>${choiceList(DATA.woods,'wood')}`;
    if(s===4) return `<div class="vs-step-title">5. Typ skla</div><div class="vs-step-sub">Vyberte typ presklenia.</div>${cardGrid(glassCards(),'glass','two')}`;
    if(s===5) return `<div class="vs-step-title">6. Doplnky</div><div class="vs-step-sub">Vyberte voliteľné doplnky.</div>${optionsList()}`;
    const r = compute();
    const chosen = state.choice.options.length ? state.choice.options.map(id=>DATA.options[id].name).join(', ') : 'Bez doplnkov';
    const plainBody = `Dobrý deň,

mám záujem o cenovú ponuku na saunu z konfigurátora Vaša Sauna.

Typ: ${r.type.name}
Umiestnenie: ${r.place.name}
Veľkosť: ${r.size.name}
Materiál: ${r.wood.name}
Sklo: ${r.glass.name}
Doplnky: ${chosen}
Orientačná cena: ${euro(r.total)} bez DPH / ${euro(r.vat)} s DPH

Prosím, kontaktujte ma s ďalším postupom.`;
    const mailBody = encodeURIComponent(plainBody);
    const subject = encodeURIComponent('Dopyt na saunu z konfigurátora');
    const mailHref = `mailto:info@vasasauna.sk?subject=${subject}&body=${mailBody}`;
    const waText = encodeURIComponent(`Dobrý deň, mám záujem o saunu z konfigurátora. Typ: ${r.type.name}, umiestnenie: ${r.place.name}, veľkosť: ${r.size.name}, materiál: ${r.wood.name}, sklo: ${r.glass.name}, cena orientačne ${euro(r.total)} bez DPH.`);
    return `<div class="vs-step-title">7. Zhrnutie konfigurácie</div><div class="vs-summary"><div class="vs-price-label">Orientačná cena vrátane montáže</div><div class="vs-price">${euro(r.total)} <small>bez DPH</small></div><div class="vs-note">Ide o ukážkový odhad. Presná ponuka sa pripraví po doladení rozmerov, priestoru a finálnych detailov.</div><div class="vs-breakdown"><div class="vs-breakrow"><span>Typ sauny</span><b>${euro(r.type.base)}</b></div><div class="vs-breakrow"><span>Umiestnenie</span><b>${r.place.mult===1?'bez zmeny':Math.round((r.place.mult-1)*100)+'%'}</b></div><div class="vs-breakrow"><span>Veľkosť</span><b>${r.size.mult===1?'štandard':Math.round((r.size.mult-1)*100)+'%'}</b></div><div class="vs-breakrow"><span>Materiál</span><b>${r.wood.mult===1?'v cene':Math.round((r.wood.mult-1)*100)+'%'}</b></div><div class="vs-breakrow"><span>Sklo</span><b>${r.glass.price? '+'+euro(r.glass.price):'v cene'}</b></div><div class="vs-breakrow"><span>Doplnky</span><b>${euro(r.options)}</b></div><div class="vs-breakrow"><span>Montáž / zabudovanie</span><b>+${euro(r.install)}</b></div><div class="vs-breakrow"><span>Orientačne s DPH</span><b>${euro(r.vat)}</b></div></div></div><div class="vs-final-contact"><a class="vs-final-mail" href="${mailHref}"><span class="vs-final-ico">✉</span><span><b>Napísať firme e-mail</b><small>Otvorí sa správa pre info@vasasauna.sk s vyplnenou konfiguráciou.</small></span></a><div class="vs-final-grid"><a href="tel:+421907435224">☎ Zavolať</a><a href="https://wa.me/421907435224?text=${waText}" target="_blank" rel="noopener">WhatsApp</a></div></div>`;
  }

  const VSWidget = {
    toggle(){ state.open ? this.close() : this.open(); },
    open(){
      state.open = true;
      chat.classList.add('visible');
      chat.setAttribute('aria-hidden','false');
      $('vasasauna-bubble').classList.add('open');
      this.hideTeaser();
      preloadLikely();
      if(!messages.dataset.init){
        addMsg('Dobrý deň. Som <b>AI asistent Vaša Sauna</b>. Pomôžem vám vybrať správny typ sauny a v konfigurátore uvidíte čistú ukážku podľa <b>typu</b>, <b>prostredia</b>, <b>veľkosti</b>, <b>materiálu</b> a <b>doplnkov</b>.', 'bot');
        messages.dataset.init = '1';
      }
    },
    close(){
      state.open = false;
      chat.classList.remove('visible','calc-open');
      chat.setAttribute('aria-hidden','true');
      $('vasasauna-bubble').classList.remove('open');
    },
    openCalc(){ this.open(); chat.classList.add('calc-open'); renderCalc(); },
    closeCalc(){ chat.classList.remove('calc-open'); },
    hideTeaser(){ teaser.classList.remove('show'); },
    submitChat(e){
      e.preventDefault();
      const val = input.value.trim();
      if(!val) return;
      input.value = '';
      addMsg(esc(val),'user');
      botAnswer(val);
    },
    quick(text){ this.open(); addMsg(esc(text),'user'); botAnswer(text); },
    select(key,id){
      if(!DATA[key+'s'] && key !== 'place'){}
      state.choice[key] = id;
      preloadLikely();
      renderCalc();
    },
    toggleOption(id){
      const arr = state.choice.options;
      const i = arr.indexOf(id);
      if(i>=0) arr.splice(i,1); else arr.push(id);
      renderCalc();
    },
    next(){ const totalSteps = 7; if(state.step < totalSteps-1){ state.step++; renderCalc(); } else { state.step = 0; renderCalc(); } },
    prev(){ if(state.step > 0){ state.step--; renderCalc(); } },
    sendLead(){
      const r = compute();
      const name = $('vs-name')?.value || '';
      const phone = $('vs-phone')?.value || '';
      const mail = $('vs-mail')?.value || '';
      const note = $('vs-note')?.value || '';
      const options = state.choice.options.length ? state.choice.options.map(id=>DATA.options[id].name).join(', ') : 'bez doplnkov';
      const body = `Dobrý deň,

nový dopyt z konfigurátora Vaša Sauna:
Meno: ${name}
Telefón: ${phone}
E-mail: ${mail}
Poznámka: ${note}

Typ: ${r.type.name}
Umiestnenie: ${r.place.name}
Veľkosť: ${r.size.name}
Materiál: ${r.wood.name}
Sklo: ${r.glass.name}
Doplnky: ${options}
Cena orientačne: ${euro(r.total)} bez DPH / ${euro(r.vat)} s DPH
`;
      window.location.href = 'mailto:info@vasasauna.sk?subject=' + encodeURIComponent('Dopyt z konfigurátora sauny') + '&body=' + encodeURIComponent(body);
    }
  };

  window.VSWidget = VSWidget;
  preloadLikely();
  setTimeout(()=>{ if(!state.open) teaser.classList.add('show'); }, 1300);
})();
</script>
</body>
