<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Aplan AI — asistent projektovej kancelárie (DEMO)</title>
<meta name="description" content="Webový AI asistent pre projektovú kanceláriu Aplan. Prevedie klienta úradnými postupmi, dokumentmi a komunikáciou s úradom a umožní rezervovať konzultáciu.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  /* ——— Aplan architektonická paleta: čistá, technická, dôveryhodná ——— */
  --ink:#16181C;        /* primárna tmavá */
  --ink-2:#23262E;
  --ink-3:#33373F;
  --paper:#FFFFFF;
  --bg:#F4F4F1;         /* off-white podklad */
  --soft:#EFEEE9;
  --soft-2:#F8F8F5;
  --line:#E3E2DC;
  --line-2:#D7D6CE;
  --muted:#6E6E66;
  --muted-2:#8C8C83;
  --accent:#B89A6E;     /* bronz/taupe — presne podľa loga Aplan */
  --accent-2:#937645;
  --accent-soft:#F2ECE1;
  --ok:#3E7C5A;
  --warn:#B8893A;
  --hard:#B25540;
  --shadow:0 30px 80px rgba(22,24,28,.20);
  --shadow-sm:0 12px 34px rgba(22,24,28,.12);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:18px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
body.ai-locked{overflow:hidden;position:fixed;width:100%}

/* ============ DEMO PODKLADOVÁ STRÁNKA (mock Aplan) ============ */
.demo-ribbon{position:fixed;top:0;left:0;right:0;z-index:50;background:var(--soft);color:var(--muted);font:600 11.5px/1.4 var(--font);letter-spacing:.01em;text-align:center;padding:7px 14px;border-bottom:1px solid var(--line)}
.demo-ribbon b{color:var(--ink);font-weight:700}
.stage{max-width:560px;margin:0 auto;padding:130px 24px 80px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
.stage-logo{display:flex}
.stage-logo svg{width:56px;height:56px}
.stage-h{font:900 40px var(--font);letter-spacing:-.02em;margin:6px 0 0}
.stage-p{font:500 16px/1.6 var(--font);color:var(--muted);max-width:44ch;margin:0}
@media(max-width:560px){.stage{padding:96px 20px 60px}.stage-h{font-size:32px}.stage-p{font-size:15px}}
.nav{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:rgba(244,244,241,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:12px}
.brand #brandmono{display:flex;align-items:center}
.brand svg{width:32px;height:32px}
.brand .word{font:900 22px var(--font);letter-spacing:.16em}
.brand .tag{font:600 10px var(--font);letter-spacing:.34em;color:var(--muted);text-transform:uppercase}
.nav-links{display:flex;gap:30px;font:600 14px var(--font)}
.nav-links a{color:var(--ink);text-decoration:none;opacity:.8;transition:opacity .2s}
.nav-links a:hover{opacity:1}
.hero{max-width:1100px;margin:0 auto;padding:96px 40px 120px}
.hero .eyebrow{font:700 12px var(--font);letter-spacing:.3em;color:var(--accent-2);text-transform:uppercase;margin-bottom:22px}
.hero h1{font:900 64px/1.02 var(--font);letter-spacing:-.02em;margin:0 0 26px;max-width:14ch}
.hero p{font:500 19px/1.6 var(--font);color:var(--muted);max-width:60ch;margin:0 0 36px}
.hero .actions{display:flex;gap:14px;flex-wrap:wrap}
.btn-dark{background:var(--ink);color:#fff;border:0;border-radius:999px;padding:15px 30px;font:700 15px var(--font);cursor:pointer;text-decoration:none;display:inline-block}
.btn-line{background:transparent;color:var(--ink);border:1.5px solid var(--line-2);border-radius:999px;padding:15px 30px;font:700 15px var(--font);cursor:pointer}
.grid-cards{max-width:1100px;margin:0 auto;padding:0 40px 120px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.gc{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:28px;min-height:160px}
.gc h3{font:800 17px var(--font);margin:0 0 8px}
.gc p{font:500 14px/1.55 var(--font);color:var(--muted);margin:0}
@media(max-width:860px){
  .nav{padding:14px 18px}.nav-links{display:none}
  .hero{padding:60px 22px 90px}.hero h1{font-size:40px}.hero p{font-size:17px}
  .grid-cards{grid-template-columns:1fr;padding:0 22px 90px}
}

/* ============ TEASER BUBLINA ============ */
#ai-teaser{position:fixed;right:20px;bottom:104px;z-index:99998;max-width:300px;background:var(--paper);color:var(--ink);border:1px solid var(--line);box-shadow:var(--shadow-sm);border-radius:16px;padding:14px 42px 14px 16px;font:650 13.5px/1.4 var(--font);opacity:0;transform:translateY(10px);pointer-events:none;transition:all .3s ease}
#ai-teaser.show{opacity:1;transform:none;pointer-events:auto}
#ai-teaser:hover{border-color:var(--line-2)}
#ai-teaser b{color:var(--accent-2)}
#ai-teaser-txt{transition:opacity .25s ease;display:inline-block}
#ai-teaser:after{content:"";position:absolute;right:30px;bottom:-7px;width:14px;height:14px;background:var(--paper);border-right:1px solid var(--line);border-bottom:1px solid var(--line);transform:rotate(45deg)}
#ai-teaser .x{position:absolute;right:8px;top:8px;width:22px;height:22px;border:0;background:var(--soft);color:var(--muted);border-radius:50%;font-size:13px;cursor:pointer;line-height:1}

/* ============ LAUNCHER ============ */
#ai-launch{position:fixed;right:20px;bottom:20px;z-index:100000;width:62px;height:62px;border:0;border-radius:18px;background:var(--ink);box-shadow:0 14px 34px rgba(22,24,28,.28);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .22s ease,box-shadow .22s ease,opacity .2s}
#ai-launch:hover{transform:translateY(-2px);box-shadow:0 18px 42px rgba(22,24,28,.34)}
#ai-launch.open{opacity:0;pointer-events:none;transform:scale(.85)}
#ai-launch .mono{width:34px;height:34px}

/* ============ CHAT PANEL ============ */
#ai-panel{position:fixed;right:20px;bottom:20px;z-index:99999;width:444px;height:min(764px,calc(100dvh - 40px));background:var(--paper);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;opacity:0;pointer-events:none;transform:translateY(20px) scale(.96);transform-origin:bottom right;transition:opacity .22s,transform .34s cubic-bezier(.2,1.2,.2,1)}
#ai-panel.open{opacity:1;pointer-events:auto;transform:none}

.ai-head{position:relative;display:flex;align-items:center;gap:13px;padding:16px 16px;background:var(--ink);color:#fff}
.ai-head .av{width:46px;height:46px;border-radius:13px;background:var(--ink-2);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.ai-head .av .mono{width:30px;height:30px}
.ai-head .ht{flex:1;min-width:0}
.ai-head .ht .t{font:800 16px var(--font);letter-spacing:.01em}
.ai-head .ht .s{display:flex;align-items:center;gap:6px;font:600 11.5px var(--font);color:rgba(255,255,255,.6);margin-top:3px}
.ai-head .ht .s i{width:7px;height:7px;border-radius:50%;background:#52c989;display:inline-block}
.ai-head .ht .s b{color:var(--accent);font-weight:700}
.ai-hactions{display:flex;gap:6px;flex:0 0 auto}
.hbtn{width:34px;height:34px;border:0;border-radius:10px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.82);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s,color .18s}
.hbtn:hover{background:rgba(255,255,255,.2);color:#fff}
.hbtn svg{width:17px;height:17px}

.ai-body{flex:1;overflow-y:auto;padding:18px 16px 8px;background:linear-gradient(180deg,var(--soft-2),var(--paper));scroll-behavior:smooth}
.ai-body::-webkit-scrollbar{width:7px}
.ai-body::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:10px}

/* správy */
.msg{display:flex;gap:9px;margin-bottom:14px;animation:rise .32s ease both}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg .ma{width:30px;height:30px;border-radius:9px;background:var(--ink);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.msg .ma .mono{width:19px;height:19px}
.msg .col{max-width:84%;display:flex;flex-direction:column}
.msg.user .col{align-items:flex-end}
.msg .mb{max-width:100%;font:500 14px/1.55 var(--font)}
.mt{font:600 10px var(--font);color:var(--muted-2);margin-top:3px;padding:0 3px}
.msg.bot .mb{background:var(--paper);border:1px solid var(--line);color:var(--ink);padding:11px 14px;border-radius:4px 16px 16px 16px;box-shadow:0 2px 8px rgba(22,24,28,.04)}
.msg.user{flex-direction:row-reverse}
.msg.user .mb{background:var(--ink);color:#fff;padding:11px 14px;border-radius:16px 4px 16px 16px}
.msg.user .ma{background:var(--accent)}
.msg.user .ma::after{content:"Vy";font:800 9px var(--font);color:#fff}
.mb b{font-weight:800}
.mb .mini{display:block;margin-top:7px;font:600 11.5px/1.45 var(--font);color:var(--muted)}
.mb ul{margin:8px 0 2px;padding-left:18px}
.mb li{margin-bottom:5px}

/* typing */
.typing{display:flex;gap:4px;padding:13px 15px;background:var(--paper);border:1px solid var(--line);border-radius:4px 16px 16px 16px;width:fit-content}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--line-2);animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.18s}.typing span:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:2px 0 16px 39px;animation:rise .3s ease both}
.chip{background:var(--paper);border:1.5px solid var(--line-2);color:var(--ink);border-radius:999px;padding:9px 15px;font:700 13px var(--font);cursor:pointer;transition:all .16s;display:inline-flex;align-items:center;gap:7px}
.chip:hover{border-color:var(--accent);background:var(--accent-soft);transform:translateY(-1px)}
.chip .ic{width:15px;height:15px;opacity:.7}
.chip.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip.primary:hover{background:var(--ink);color:var(--accent)}

/* úvodné menu — premiový zoznam */
.menu{margin:6px 0 12px 0;animation:rise .3s ease both}
.menu-card{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--paper);box-shadow:0 8px 24px rgba(22,24,28,.07)}
.mrow{position:relative;display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:0;border-bottom:1px solid var(--line);background:var(--paper);padding:13px 15px;cursor:pointer;transition:background .18s;font-family:var(--font)}
.mrow:last-child{border-bottom:0}
.mrow::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);transform:scaleY(0);transform-origin:center;transition:transform .2s;border-radius:0 3px 3px 0}
.mrow:hover{background:var(--soft-2)}
.mrow:hover::before{transform:scaleY(1)}
.mrow .mi{width:36px;height:36px;border-radius:10px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;flex:0 0 auto;transition:background .18s}
.mrow:hover .mi{background:var(--accent)}
.mrow .mi svg{width:17px;height:17px;color:var(--accent-2);transition:color .18s}
.mrow:hover .mi svg{color:#fff}
.mrow .mt2{flex:1;min-width:0}
.mrow .mt2 b{display:block;font:700 13.5px var(--font);color:var(--ink);letter-spacing:-.01em}
.mrow .mt2 span{display:block;font:600 11px var(--font);color:var(--muted);margin-top:1px}
.mrow .mchev{width:15px;height:15px;color:var(--line-2);flex:0 0 auto;transition:transform .18s,color .18s}
.mrow:hover .mchev{color:var(--accent-2);transform:translateX(3px)}
.menu .resv{margin-bottom:11px}
.resv{display:flex;align-items:center;gap:12px;border:1px solid var(--line);background:var(--paper);border-radius:13px;padding:12px 13px;cursor:pointer;transition:all .15s}
.resv:hover{border-color:var(--accent);box-shadow:0 6px 18px rgba(22,24,28,.06)}
.resv.hi{border-color:var(--accent);background:var(--accent-soft)}
.resv.hi:hover{box-shadow:0 8px 22px rgba(181,137,75,.15)}
.resv .ri{width:40px;height:40px;border-radius:11px;background:var(--ink);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.resv.hi .ri{background:var(--accent-2)}
.resv .ri svg{width:19px;height:19px;color:#fff;stroke:#fff}
.resv .rt{flex:1;min-width:0}
.resv .rt b{font:800 13.5px var(--font);display:block;color:var(--ink)}
.resv .rt span{font:600 11px var(--font);color:var(--muted)}
.resv .rg svg{width:16px;height:16px;color:var(--muted-2)}
.aplan-note{margin-top:8px;border-left:2px solid var(--accent);background:var(--accent-soft);border-radius:0 10px 10px 0;padding:9px 12px;font:600 12px/1.5 var(--font);color:var(--ink-3)}
.aplan-note b{color:var(--ink)}
.gdpr{display:flex;align-items:flex-start;gap:8px;margin:9px 0 2px;cursor:pointer}
.gdpr input{margin-top:1px;accent-color:var(--accent);flex:0 0 auto;width:15px;height:15px;cursor:pointer}
.gdpr span{font:600 10.5px/1.45 var(--font);color:var(--muted)}
.gdpr a{color:var(--accent-2);font-weight:700}
.confirm-send{display:inline-block;margin-top:11px;background:var(--ink);color:#fff;text-decoration:none;border-radius:11px;padding:10px 16px;font:800 13px var(--font);transition:color .18s}
.confirm-send:hover{color:var(--accent)}

/* karty / panely vnútri správy */
.panel{margin-top:10px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--paper)}
.panel-h{background:var(--soft);padding:10px 13px;font:800 12.5px var(--font);letter-spacing:.02em;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.panel-h .pin{width:8px;height:8px;border-radius:2px;background:var(--accent)}
.panel-b{padding:13px}

/* prehliadač oblastí (KB) */
.kbcat{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:1px solid var(--line);background:var(--soft-2);border-radius:12px;padding:11px 12px;margin-bottom:8px;cursor:pointer;transition:all .15s;font-family:var(--font)}
.kbcat:last-child{margin-bottom:0}
.kbcat:hover{border-color:var(--accent);background:var(--accent-soft)}
.kbcat .ic{width:18px;height:18px;color:var(--accent-2);flex:0 0 auto}
.kbcat>div{flex:1;min-width:0}
.kbcat .kt{font:800 13px var(--font);color:var(--ink)}
.kbcat .kd{font:600 11px var(--font);color:var(--muted);margin-top:1px}
.kbcat>svg:last-child{width:16px;height:16px;color:var(--muted-2);flex:0 0 auto}

/* checklist */
.check{display:flex;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line)}
.check:last-child{border-bottom:0}
.check .box{width:20px;height:20px;border:1.5px solid var(--line-2);border-radius:6px;flex:0 0 auto;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.check .box.on{background:var(--accent);border-color:var(--accent)}
.check .box svg{width:12px;height:12px;opacity:0;transition:opacity .15s}
.check .box.on svg{opacity:1}
.check .ct{font:700 13px var(--font)}
.check .cd{font:500 11.5px/1.4 var(--font);color:var(--muted);margin-top:2px}

/* kroky / steps */
.step{display:flex;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
.step:last-child{border:0}
.step .n{width:25px;height:25px;border-radius:8px;background:var(--ink);color:#fff;font:800 12px var(--font);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.step .st{font:800 13px var(--font);margin-bottom:2px}
.step .sd{font:500 12px/1.45 var(--font);color:var(--muted)}

/* mini-formuláre */
.field{margin-bottom:9px}
.field label{display:block;font:700 11.5px var(--font);color:var(--ink-3);margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--line-2);border-radius:11px;background:var(--soft-2);font:600 13px var(--font);color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;font-family:var(--font)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(181,137,75,.14);background:#fff}
.field textarea{resize:vertical;min-height:64px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.btn-go{width:100%;background:var(--ink);color:#fff;border:0;border-radius:12px;padding:12px;font:800 14px var(--font);cursor:pointer;margin-top:4px;transition:background .18s}
.btn-go:hover{background:var(--ink);color:var(--accent)}
.btn-ghost{width:100%;background:var(--soft);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:11px;font:700 13px var(--font);cursor:pointer;margin-top:7px}

/* kalendár */
.cal-l{font:800 10px var(--font);letter-spacing:.09em;text-transform:uppercase;color:var(--muted-2);margin:14px 2px 8px}
.cal-card>.cal-l:first-child{margin-top:2px}
.cal-types{border:1px solid var(--line);border-radius:12px;overflow:hidden}
.cal-type{display:flex;align-items:center;gap:11px;border:0;border-bottom:1px solid var(--line);padding:12px 13px;cursor:pointer;transition:background .15s;background:transparent}
.cal-type:last-child{border-bottom:0}
.cal-type:hover{background:var(--accent-soft)}
.cal-type.on{background:var(--accent-soft)}
.cal-type .ctt{flex:1;min-width:0}
.cal-type .tt{font:800 13px var(--font);color:var(--ink)}
.cal-type .td{font:600 11px var(--font);color:var(--muted);margin-top:2px}
.cal-type .rad{width:19px;height:19px;border-radius:50%;border:2px solid var(--line-2);flex:0 0 auto;position:relative;transition:all .15s}
.cal-type.on .rad{border-color:var(--accent)}
.cal-type.on .rad::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--accent)}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 9px}
.cal-month{font:800 14px var(--font);color:var(--ink)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font:700 9.5px var(--font);color:var(--muted-2);text-align:center;text-transform:uppercase;padding:2px 0 5px}
.cal-day{aspect-ratio:1;border:1px solid transparent;border-radius:10px;background:transparent;font:600 12.5px var(--font);color:var(--line-2);cursor:default;display:flex;align-items:center;justify-content:center;transition:all .14s}
.cal-day.free{color:var(--ink);font-weight:700;cursor:pointer}
.cal-day.free:hover{background:var(--accent-soft)}
.cal-day.on{background:var(--ink);color:#fff;font-weight:800}
.cal-times{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.cal-time{border:1.5px solid var(--line);border-radius:11px;padding:11px 0;text-align:center;font:700 13px var(--font);color:var(--ink);cursor:pointer;background:var(--paper);transition:all .14s}
.cal-time:hover{border-color:var(--accent);background:var(--accent-soft)}
.cal-time.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.cal-card{border:1px solid var(--line);border-radius:14px;background:var(--paper);padding:13px;margin-top:10px}

/* generovaný text / box na kopírovanie */
.copybox{background:var(--ink);color:#EDEDE6;border-radius:12px;padding:13px 14px;font:500 12.5px/1.6 var(--font);white-space:pre-wrap;margin-top:4px;max-height:240px;overflow-y:auto}
.copyrow{display:flex;gap:8px;margin-top:8px}
.copyrow button{flex:1;border:0;border-radius:10px;padding:10px;font:800 12.5px var(--font);cursor:pointer}
.cp-copy{background:var(--accent);color:#fff}
.cp-copy.done{background:var(--ok)}
.cp-mail{background:var(--soft);color:var(--ink);border:1px solid var(--line)!important}

/* badge náročnosti */
.diff{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:7px 13px;font:800 12.5px var(--font);margin-top:4px}
.diff.e{background:#e7f2ec;color:var(--ok)}
.diff.m{background:#f6edda;color:var(--warn)}
.diff.h{background:#f6e3dd;color:var(--hard)}
.diff .d{width:9px;height:9px;border-radius:50%;background:currentColor}

/* potvrdenia */
.confirm{margin-top:10px;border:1px solid var(--line);border-left:3px solid var(--accent);background:var(--accent-soft);border-radius:12px;padding:13px 14px}
.confirm .ci{display:flex;align-items:center;gap:8px;font:800 13px var(--font);margin-bottom:5px}
.confirm .cb{font:600 12.5px/1.5 var(--font);color:var(--ink-3)}

/* rýchle kontakty — kompaktná lišta pod inputom */

<body>

<!-- ============ DEMO podkladová stránka (mock Aplan) ============ -->
<div class="demo-ribbon">Ukážka <b>AI asistenta</b> — vpravo dole otvorte chat a vyskúšajte ho.</div>

<!-- ============ AI ASISTENT ============ -->
<div id="ai-teaser" onclick="aiOpen()">

</div>

<button id="ai-launch" aria-label="Otvoriť asistenta" onclick="aiOpen()">

</button>

<div id="ai-panel" role="dialog" aria-label="Aplan AI asistent">
  <div class="ai-head">

    <div class="ht">
      <div class="t">Aplan AI</div>

    </div>

      </button>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
  </div>
  <div class="ai-body" id="ai-body"></div>
  <div class="ai-compose">
    <input id="ai-input" placeholder="Napíšte správu…" autocomplete="off">
    <button class="send" onclick="aiUserSend()" aria-label="Odoslať">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
  <div class="ai-foot" id="ai-foot"></div>
</div>

<script>
/* =========================================================
   APLAN AI — webový asistent projektovej kancelárie.
   Sprevádza klienta úradnými postupmi, dokumentmi a
   komunikáciou s úradom a umožňuje rezerváciu konzultácie.
   ========================================================= */

/* === KONFIGURÁCIA — jediné miesto na vyplnenie údajov firmy === */
const CFG = {
  firma:      'Aplan',
  telefon:    '+421 911 123 456',   // zobrazený formát
  telefonRaw: '+421911123456',      // pre tel: (bez medzier)
  whatsapp:   '421911123456',       // pre wa.me (medzinárodné číslo bez +)
  email:      'info@aplan.sk',
  web:        'https://www.aplan.sk',
  gdprUrl:    'https://www.aplan.sk/ochrana-osobnych-udajov',
  hodiny:     'Po–Pia 8:00–16:00'
};

/* ——— Logo: chevron „A" z reálneho loga Aplan + „i" s bodkou => „AI" verzia značky ——— */
function mono(){
  return `<svg class="mono" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M14 4 L25 37 L19.4 37 L14 19.2 L8.6 37 L3 37 Z" fill="#B89A6E"/>
    <rect x="30" y="16" width="4" height="21" rx="1.6" fill="#B89A6E"/>
    <circle cx="32" cy="10.2" r="2.9" fill="#B89A6E"/>
  </svg>`;
}
document.getElementById('launchmono').outerHTML = mono('#fff');
document.getElementById('headmono').outerHTML = mono('#fff');
document.getElementById('brandmono').innerHTML = mono('#16181C');

const body  = document.getElementById('ai-body');
const input = document.getElementById('ai-input');
let started = false;

/* ——— ikonky ——— */
const I = {
  search:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>',
  steps :'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>',
  mail  :'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>',
  pkg   :'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8 12 3 3 8v8l9 5 9-5z"/><path d="m3 8 9 5 9-5M12 13v8"/></svg>',
  cal   :'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>',
  list  :'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>',
  send  :'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>',
  phone :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z"/></svg>',
  wa    :'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2zm5.5 14c-.2.6-1.2 1.1-1.7 1.2-.5.1-1 .1-1.7-.1-.4-.1-.9-.3-1.6-.6-2.8-1.2-4.6-4-4.7-4.2-.1-.2-1.1-1.5-1.1-2.8 0-1.3.7-2 .9-2.2.2-.2.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.7 1.7c.1.2.1.3 0 .5l-.4.5c-.1.2-.3.3-.1.6.1.2.6 1 1.3 1.6.9.8 1.6 1 1.8 1.1.2.1.4.1.5-.1l.6-.7c.2-.2.3-.2.6-.1l1.6.8c.2.1.4.2.5.3.1.1.1.6-.1 1.1z"/></svg>',
  chk   :'<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  book  :'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5a2 2 0 0 1 2-2h13v16H6a2 2 0 0 0-2 2z"/><path d="M19 3v18"/></svg>',
  faq   :'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 5 .3c0 1.7-2.5 2-2.5 3.7M12 17h.01"/></svg>',
  arrow :'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>',
  info  :'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 7.5h.01"/></svg>'
};

/* ——— jadro konverzácie ——— */
function el(html){const d=document.createElement('div');d.innerHTML=html.trim();return d.firstChild;}
function scroll(){body.scrollTop=body.scrollHeight;}

function stamp(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function botMsg(html){
  const m=el(`<div class="msg bot"><div class="ma">${mono('#fff')}</div><div class="col"><div class="mb">${html}</div><div class="mt">${stamp()}</div></div></div>`);
  body.appendChild(m);scroll();return m;
}
function userMsg(text){
  body.appendChild(el(`<div class="msg user"><div class="ma"></div><div class="col"><div class="mb">${esc(text)}</div><div class="mt">${stamp()}</div></div></div>`));scroll();
}
function chipRow(list){
  const row=el('<div class="chips"></div>');
  list.forEach(c=>{
    const b=el(`<button class="chip ${c.primary?'primary':''}">${c.ic||''}${esc(c.t)}</button>`);
    b.onclick=()=>{ row.remove(); userMsg(c.t); typing(()=> (c.fn||(()=>{}))() ); };
    row.appendChild(b);
  });
  body.appendChild(row);scroll();return row;
}
function typing(cb,delay){
  const t=el('<div class="msg bot"><div class="ma">'+mono('#fff')+'</div><div class="typing"><span></span><span></span><span></span></div></div>');
  body.appendChild(t);scroll();
  setTimeout(()=>{t.remove();cb();},delay||760+Math.random()*420);
}
function esc(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

/* ——— otvorenie / zatvorenie ——— */
function aiOpen(){
  document.getElementById('ai-panel').classList.add('open');
  document.getElementById('ai-launch').classList.add('open');
  aiTeaserClose();
  if(window.matchMedia('(max-width:520px)').matches) document.body.classList.add('ai-locked');
  if(!started){started=true;welcome();}
}
const teaserPhrases=[
  'Potrebujete pomôcť s vybavením vecí na úrade?',
  'Zistite, aké kroky a dokumenty potrebujete.',
  'AI asistent vám pomôže pripraviť sa na úradné vybavovanie.'
];
let teaserI=0,teaserTimer=null;
function aiTeaserShow(){
  if(started)return;
  const t=document.getElementById('ai-teaser'),txt=document.getElementById('ai-teaser-txt');
  txt.textContent=teaserPhrases[0];t.classList.add('show');
  teaserTimer=setInterval(()=>{
    if(!t.classList.contains('show'))return;
    txt.style.opacity=0;
    setTimeout(()=>{teaserI=(teaserI+1)%teaserPhrases.length;txt.textContent=teaserPhrases[teaserI];txt.style.opacity=1;},260);
  },4800);
}
function aiTeaserClose(){
  document.getElementById('ai-teaser').classList.remove('show');
  if(teaserTimer){clearInterval(teaserTimer);teaserTimer=null;}
}
function aiClose(){
  document.getElementById('ai-panel').classList.remove('open');
  document.getElementById('ai-launch').classList.remove('open');
  document.body.classList.remove('ai-locked');
}

/* ——— úvod: bez uvítacej správy, rovno akčné chipy (návod je v inpute) ——— */
function welcome(){ renderMenu(); }
function menu(){ body.querySelectorAll('.menu').forEach(x=>x.remove()); renderMenu(); }
function aiHome(){ menu(); }
function renderMenu(){
  const wrap=el('<div class="menu"></div>');
  const card=el('<div class="menu-card"></div>');
  const rows=[
    ['Úradné postupy','Stavebné povolenie, ohlásenie, kolaudácia, prístavba',I.steps,'uradne'],
    ['Komunikácia s úradom','Čo a ako napísať, ako reagovať na výzvu úradu',I.mail,'kom'],
    ['Aké podklady potrebujem?','Prehľadný checklist dokumentov',I.list,'podklady'],
    ['Čo robí Aplan','V skratke, ako vám vieme pomôcť',I.info,'about'],
    ['Pojmy, skratky a vysvetlenia','Služby, postupy a časté otázky',I.book,'kb']
  ];
  rows.forEach(it=>{
    const b=el(`<button class="mrow"><span class="mi">${it[2]}</span><div class="mt2"><b>${it[0]}</b><span>${it[1]}</span></div><svg class="mchev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>`);
    b.onclick=()=>{wrap.remove();userMsg(it[0]);typing(()=>topic(it[3]));};
    card.appendChild(b);
  });
  wrap.appendChild(card);
  body.appendChild(wrap);scroll();
}
function aiRestart(){ body.innerHTML=''; welcome(); }
function backMenu(){ setTimeout(()=>chipRow([{t:'Späť na menu',fn:menu},{t:'Poslať dopyt',ic:I.send,primary:true,fn:flowLead}]),250); }

/* ——— krokový sprievodca témami ——— */
function infoBlock(title,html){return `<div class="panel"><div class="panel-h"><span class="pin"></span>${title}</div><div class="panel-b" style="font:500 13px/1.55 var(--font);color:var(--ink-3)">${html}</div></div>`;}
function postup(title,steps){
  let h=`<div class="panel"><div class="panel-h"><span class="pin"></span>${title}</div><div class="panel-b">`;
  steps.forEach((s,i)=>h+=`<div class="step"><div class="n">${i+1}</div><div><div class="st">${s[0]}</div><div class="sd">${s[1]}</div></div></div>`);
  return h+'</div></div>';
}
function aplanNote(html){return `<div class="aplan-note"><b>Čo pripraví Aplan:</b> ${html}</div>`;}
function next(arr){ setTimeout(()=>chipRow(arr.concat([{t:'Späť na menu',fn:menu}])),260); }
const RESV={t:'Rezervovať konzultáciu',ic:I.cal,fn:flowCalendar};
const C_PISAT={t:'Čo napísať na úrad?',ic:I.mail,fn:()=>flowLetter()};
function topic(id){ (TT[id]||menu)(); }

const TT={
  /* Úradné postupy — rozcestník */
  uradne(){
    botMsg('<b>Úradné postupy.</b> Vyberte, čo riešite — rozpíšem vám jasný postup krok za krokom: čo pripraviť, na ktorý úrad ísť, čo sa podáva a aké sú prílohy.');
    next([
      {t:'Stavebné povolenie',ic:I.steps,fn:()=>topic('sp')},
      {t:'Ohlásenie drobnej stavby',ic:I.steps,fn:()=>topic('od')},
      {t:'Kolaudácia',ic:I.steps,fn:()=>topic('kol')},
      {t:'Zmena stavby alebo prístavba',ic:I.steps,fn:()=>topic('zmena')}
    ]);
  },
  /* Stavebné povolenie */
  sp(){
    botMsg('<b>Stavebné povolenie</b> — postup krok za krokom:');
    botMsg(postup('Stavebné povolenie',[
      ['Pripravte podklady','List vlastníctva, kópia z katastrálnej mapy, údaje o pozemku a vaša predstava o stavbe.'],
      ['Projektová dokumentácia','Dokumentáciu pre stavebné povolenie vrátane potrebných profesií pripraví projektová kancelária.'],
      ['Vyjadrenia dotknutých orgánov','Zabezpečte vyjadrenia správcov sietí a dotknutých orgánov podľa typu a lokality stavby.'],
      ['Podanie žiadosti','Žiadosť podáte na príslušnom stavebnom úrade (obec/mesto) — osobne, poštou alebo cez slovensko.sk.'],
      ['Prílohy k žiadosti','Projektová dokumentácia, list vlastníctva, vyjadrenia, doklad o úhrade správneho poplatku.'],
      ['Konanie a rozhodnutie','Úrad môže vyžiadať doplnenie; po splnení podmienok vydá rozhodnutie.']
    ])+aplanNote('kompletnú projektovú dokumentáciu a odborné podklady. Podanie a vyjadrenia si zabezpečuje stavebník — poradíme ako.'));
    next([C_PISAT,RESV]);
  },
  /* Ohlásenie drobnej stavby */
  od(){
    botMsg('<b>Ohlásenie drobnej stavby</b> (napr. garáž, prístrešok, plot) — postup krok za krokom:');
    botMsg(postup('Ohlásenie drobnej stavby',[
      ['Pripravte podklady','List vlastníctva, jednoduchá situácia/náčrt a základné rozmery stavby.'],
      ['Jednoduchá dokumentácia','Pri drobnej stavbe stačí jednoduchšia dokumentácia — pripraví ju projektová kancelária podľa potreby.'],
      ['Ohlásenie na úrad','Ohlásenie podáte na príslušnom stavebnom úrade (obec/mesto).'],
      ['Prílohy','Formulár ohlásenia, jednoduchá dokumentácia/náčrt, list vlastníctva, prípadne súhlas susedov a vyjadrenia.'],
      ['Stanovisko úradu','Počkajte na písomné stanovisko úradu, či proti realizácii nemá námietky.']
    ])+aplanNote('jednoduchú dokumentáciu/náčrt a poradí, či pre váš zámer postačuje ohlásenie.'));
    next([{t:'Stačí ohlásenie, alebo treba povolenie?',fn:()=>flowLetter('ohlaska_povolenie')},C_PISAT,RESV]);
  },
  /* Kolaudácia */
  kol(){
    botMsg('<b>Kolaudácia</b> — postup krok za krokom:');
    botMsg(postup('Kolaudácia',[
      ['Dokončite stavbu','Stavba musí byť v stave spôsobilom na užívanie.'],
      ['Zabezpečte doklady','Revízne správy (elektro, komín, plyn…), energetický certifikát a geometrický plán — zameranie stavby.'],
      ['Návrh na kolaudáciu','Podáte na príslušnom stavebnom úrade.'],
      ['Prílohy','Návrh na kolaudáciu, projekt skutočného vyhotovenia (ak boli zmeny), revízie, certifikát, geometrický plán.'],
      ['Obhliadka a rozhodnutie','Úrad vykoná obhliadku a vydá kolaudačné rozhodnutie.']
    ])+aplanNote('projekt skutočného vyhotovenia a odborné podklady. Presný zoznam dokladov určuje úrad.'));
    next([C_PISAT,RESV]);
  },
  /* Zmena stavby alebo prístavba */
  zmena(){
    botMsg('<b>Zmena stavby alebo prístavba</b> — postup krok za krokom:');
    botMsg(postup('Zmena stavby / prístavba',[
      ['Zhodnoťte existujúcu stavbu','Pripravte pôvodnú dokumentáciu (ak je), rozmery a fotky súčasného stavu.'],
      ['Návrh zmeny / prístavby','Projektová kancelária navrhne riešenie a posúdi nadväznosť na pôvodnú stavbu vrátane statiky.'],
      ['Dokumentácia a režim','Podľa rozsahu ide o ohlásenie alebo stavebné povolenie — dokumentáciu pripravíme v primeranom rozsahu.'],
      ['Vyjadrenia a podanie','Zabezpečte potrebné vyjadrenia a podajte na príslušnom stavebnom úrade.'],
      ['Prílohy','Dokumentácia zmeny/prístavby, list vlastníctva, vyjadrenia, doklad o úhrade poplatku.']
    ])+aplanNote('návrh a projektovú dokumentáciu prístavby/zmeny vrátane potrebných profesií.'));
    next([{t:'Stavebné povolenie',ic:I.steps,fn:()=>topic('sp')},C_PISAT,RESV]);
  },
  /* Komunikácia s úradom */
  kom(){

  ]);
}

  botMsg('Komunikovali ste už s obcou alebo stavebným úradom?');
  chipRow([
    {t:'Áno, mám vyjadrenie',fn:()=>{need.urad='áno';needResult();}},
    {t:'Ešte nie',fn:()=>{need.urad='nie';needResult();}}
  ]);
}
function needResult(){
  // jednoduchá scenárovaná logika
  let zaver, naroc='m', narocT='stredne náročné';
  const t=need.typ;
  if(t==='menšia stavba'){zaver='ohláška drobnej stavby alebo jednoduchšia projektová dokumentácia';naroc='e';narocT='jednoduché';}
  else if(t==='dodatočná legalizácia'){zaver='dodatočné konanie a zameranie skutočného stavu — typicky náročnejší prípad';naroc='h';narocT='komplikované';}
  else if(t==='rekonštrukcia'||t==='zmena stavby'){zaver='projekt zmeny stavby a podľa rozsahu ohláška alebo stavebné povolenie';naroc='m';}
  else if(t==='prístavba'||t==='nadstavba'){zaver='projektová dokumentácia pre stavebné povolenie (zásah do existujúcej stavby)';naroc='m';}
  else if(t==='nový rodinný dom'){zaver='projektová dokumentácia pre stavebné povolenie rodinného domu';naroc='m';}
  else if(t==='kúpa pozemku'){zaver='úvodné posúdenie možností pozemku a územnoplánovacia informácia ešte pred kúpou';naroc='e';narocT='jednoduché';}
  else {zaver='úvodná konzultácia s projektantom, ktorá určí ďalší postup';naroc='e';narocT='jednoduché';}
  if(need.urad==='nie') naroc = naroc==='e'?'m':naroc;

  botMsg(`Ďakujem. Podľa odpovedí to <b>orientačne</b> vyzerá takto:
    <div class="panel"><div class="panel-h"><span class="pin"></span>Orientačný záver</div><div class="panel-b">
      <div style="font:700 13px var(--font);margin-bottom:6px">Pravdepodobne budete potrebovať:</div>
      <div style="font:600 13px/1.5 var(--font);color:var(--ink-3)">${zaver}.</div>
      <div class="diff ${naroc}"><span class="d"></span>Náročnosť: ${narocT}</div>
      <span class="mini">Toto je orientačný odhad. Presné posúdenie závisí od konkrétnej obce a stavebného úradu a je vhodné ho konzultovať s projektantom.</span>
    </div></div>`);
  setTimeout(()=>chipRow([
    {t:'Zobraziť checklist dokumentov',ic:I.list,primary:true,fn:()=>flowChecklist(need.typ)},
    {t:'Vytvoriť správu na úrad',ic:I.mail,fn:flowLetter},
    {t:'Projektový štartovací balík',ic:I.pkg,fn:flowPackage},
    {t:'Rezervovať konzultáciu',ic:I.cal,fn:flowCalendar},
    {t:'Poslať dopyt firme Aplan',ic:I.send,fn:flowLead}
  ]),320);
}

function flowLetter(preset){
  botMsg('Pripravím vám <b>slušný, použiteľný text</b>, ktorý si len skopírujete. Čo chcete napísať?');
  if(preset){return setTimeout(()=>letterForm(preset),250);}
  setTimeout(()=>chipRow([
    {t:'Otázka na obec — územný plán',fn:()=>letterForm('obec_uzemny')},
    {t:'Či sa dá na pozemku stavať',fn:()=>letterForm('da_sa_stavat')},
    {t:'Stačí ohláška alebo povolenie?',fn:()=>letterForm('ohlaska_povolenie')},
    {t:'Zoznam potrebných príloh',fn:()=>letterForm('prilohy')},
    {t:'Správa pre projektanta',fn:()=>letterForm('projektant')}
  ]),250);
}
function letterForm(key){
  const d=letterDefs[key];
  let h=`<div class="panel"><div class="panel-h"><span class="pin"></span>${d.title}</div><div class="panel-b" data-letter="${key}">`;
  d.fields.forEach((f,i)=>{
    h+= f.toLowerCase().includes('popis')
      ? `<div class="field"><label>${f}</label><textarea data-f="${i}" placeholder="${f}…"></textarea></div>`
      : `<div class="field"><label>${f}</label><input data-f="${i}" placeholder="${f}…"></div>`;
  });
  h+=`<button class="btn-go">Vygenerovať text</button></div></div>`;
  const m=botMsg(h);
  const panel=m.querySelector('[data-letter]');
  panel.querySelector('.btn-go').onclick=()=>{
    const vals=[...panel.querySelectorAll('[data-f]')].map(x=>x.value.trim());
    typing(()=>{
      botMsg('Tu je návrh správy. Skontrolujte si údaje a pokojne ho upravte.'+
        copyBlock(d.build(vals)));
      backMenu();
    });
  };
}
function copyBlock(text){
  const id='cp'+Math.random().toString(36).slice(2,7);
  setTimeout(()=>{
    const btn=document.getElementById(id);
    if(btn) btn.onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(text);btn.textContent='Skopírované ✓';btn.classList.add('done');};
    const mb=document.getElementById(id+'m');
    if(mb) mb.onclick=()=>{ window.location.href='mailto:?body='+encodeURIComponent(text); };
  },30);
  return `<div class="copybox">${esc(text)}</div>
    <div class="copyrow"><button class="cp-copy" id="${id}">Skopírovať text</button><button class="cp-mail" id="${id}m">Otvoriť e-mail</button></div>
    <span class="mini">Text si skopírujte a odošlite zo svojej e-mailovej schránky.</span>`;
}

const booking={};
function flowCalendar(){
  booking.type=null;booking.day=null;booking.time=null;
  botMsg('<b>Rezervácia konzultácie</b> — vyberte typ stretnutia, termín a čas.');
  const m=botMsg(`<div class="cal-card" data-cal>
    <div class="cal-l">Typ stretnutia</div>
    <div class="cal-types">
      <div class="cal-type" data-t="Osobná konzultácia"><div class="ctt"><div class="tt">Osobná konzultácia</div><div class="td">v kancelárii Aplan · 45 min</div></div><span class="rad"></span></div>
      <div class="cal-type" data-t="Telefonická konzultácia"><div class="ctt"><div class="tt">Telefonická konzultácia</div><div class="td">zavoláme vám · 20 min</div></div><span class="rad"></span></div>
      <div class="cal-type" data-t="Online konzultácia"><div class="ctt"><div class="tt">Online konzultácia</div><div class="td">cez video hovor · 30 min</div></div><span class="rad"></span></div>
      <div class="cal-type" data-t="Úvodné posúdenie zámeru"><div class="ctt"><div class="tt">Úvodné posúdenie zámeru</div><div class="td">prvotné zhodnotenie · 30 min</div></div><span class="rad"></span></div>
    </div>
    <div data-calstage></div></div>`);
  const p=m.querySelector('[data-cal]');
  p.querySelectorAll('.cal-type').forEach(c=>c.onclick=()=>{
    p.querySelectorAll('.cal-type').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');booking.type=c.dataset.t;renderCalDays(p.querySelector('[data-calstage]'));
  });
}
function renderCalDays(stage){
  const months=['januára','februára','marca','apríla','mája','júna','júla','augusta','septembra','októbra','novembra','decembra'];
  const dow=['Po','Ut','St','Št','Pi','So','Ne'];
  const today=new Date(2026,5,16); // demo: 16. jún 2026
  const y=today.getFullYear(),mo=today.getMonth();
  const first=new Date(y,mo,1); let startIdx=(first.getDay()+6)%7;
  const daysInMonth=new Date(y,mo+1,0).getDate();
  let h=`<div class="cal-l">Termín</div><div class="cal-head"><div class="cal-month">jún 2026</div></div><div class="cal-grid">`;
  dow.forEach(d=>h+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<startIdx;i++)h+='<div class="cal-day off"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(y,mo,d); const wd=(date.getDay()+6)%7;
    const past=d<today.getDate(); const weekend=wd>=5;
    const free=!past&&!weekend&&(d%2===0||d%3===0);
    h+=`<div class="cal-day ${past||weekend?'off':''} ${free?'free':''}" ${free?`data-d="${d}"`:''}>${d}</div>`;
  }
  h+='</div><div data-times></div>';
  stage.innerHTML=h;
  stage.querySelectorAll('[data-d]').forEach(c=>c.onclick=()=>{
    stage.querySelectorAll('.cal-day').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');booking.day=c.dataset.d+'. '+months[mo]+' '+y;
    renderCalTimes(stage.querySelector('[data-times]'));
  });
}
function renderCalTimes(t){
  const times=['08:30','09:30','11:00','13:00','14:30','16:00'];
  let h='<div class="cal-l">Čas</div><div class="cal-times">';
  times.forEach(x=>h+=`<div class="cal-time" data-x="${x}">${x}</div>`);
  h+='</div>';
  t.innerHTML=h;
  t.querySelectorAll('.cal-time').forEach(c=>c.onclick=()=>{
    t.querySelectorAll('.cal-time').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');booking.time=c.dataset.x;
    setTimeout(()=>calContact(),200);
  });
}

  const m=botMsg(`<div class="cal-card" data-calc>

function flowChecklist(typ){
  const base=[
    ['List vlastníctva','Preukazuje, kto je vlastníkom pozemku/stavby.'],
    ['Katastrálna mapa','Ukazuje tvar a polohu parcely a susedné pozemky.'],
    ['Parcelné číslo','Jednoznačne identifikuje pozemok.'],
    ['Územnoplánovacia informácia','Z obce — či a ako sa dá na pozemku stavať.'],
    ['Fotky pozemku alebo stavby','Pomôžu projektantovi pri prvotnom posúdení.'],
    ['Informácie o sieťach','Voda, elektrina, kanalizácia, plyn — dostupnosť a napojenie.']
  ];
  const extra={
    'rekonštrukcia':[['Pôvodná projektová dokumentácia','Ak existuje — výrazne urýchli prácu.'],['Rozmery existujúcej stavby','Zameranie alebo aspoň základné rozmery.'],['Staré rozhodnutia alebo povolenia','Pôvodné kolaudačné/stavebné rozhodnutie.']],
    'zmena stavby':[['Pôvodná projektová dokumentácia','Podklad pre návrh zmeny.'],['Rozmery existujúcej stavby','Aktuálny stav stavby.']],
    'dodatočná legalizácia':[['Staré rozhodnutia alebo povolenia','Čo k stavbe existuje.'],['Zameranie skutočného stavu','Reálny stav postavenej stavby.'],['Vyjadrenia od obce alebo úradu','Čo už úrad k veci uviedol.']],
    'prístavba / nadstavba':[['Pôvodná projektová dokumentácia','Pre nadväznosť na existujúcu stavbu.'],['Rozmery existujúcej stavby','Aby prístavba/nadstavba sadla.']]
  };
  let list=base.slice();
  const key=Object.keys(extra).find(k=>typ&&(typ.includes(k)||k.includes(typ)));
  if(key) list=list.concat(extra[key]);
  botMsg(`Checklist dokumentov${typ?(' pre: <b>'+esc(typ)+'</b>'):''}. Odškrtnite si, čo už máte. <span class="mini">Pri každom bode je krátke vysvetlenie, načo je dobrý.</span>`);
  let h='<div class="panel"><div class="panel-h"><span class="pin"></span>Dokumenty</div><div class="panel-b" data-chk>';
  list.forEach(it=>h+=`<div class="check"><div class="box">${I.chk}</div><div><div class="ct">${it[0]}</div><div class="cd">${it[1]}</div></div></div>`);
  h+='</div></div>';
  const m=botMsg(h);
  m.querySelectorAll('.check .box').forEach(b=>b.onclick=()=>b.classList.toggle('on'));
  m.querySelectorAll('.check .ct, .check .cd').forEach(t=>t.onclick=()=>{const b=t.closest('.check').querySelector('.box');b.classList.toggle('on');});
  setTimeout(()=>chipRow([
    {t:'Vytvoriť správu na úrad',ic:I.mail,primary:true,fn:flowLetter},
    {t:'Rezervovať konzultáciu',ic:I.cal,fn:flowCalendar},
    {t:'Späť na menu',fn:menu}
  ]),300);
}

/* ——— prehliadač vedomostnej bázy ——— */
function flowKB(){
  botMsg('Tu nájdete <b>kompletný prehľad</b> — služby, postupy, pojmy aj časté otázky. Vyberte oblasť, alebo dole napíšte, čo hľadáte (napr. <i>kolaudácia, prístavba, cena, územný plán</i>).');
  const m=botMsg(`<div class="panel"><div class="panel-h"><span class="pin"></span>Oblasti</div><div class="panel-b" data-cats></div></div>`);
  const wrap=m.querySelector('[data-cats]');
  CATS.forEach(c=>{
    const n=c.id==='dokumenty'?'' :` · ${KB.filter(k=>k.cat===c.id).length} tém`;
    const row=el(`<button class="kbcat">${c.ic}<div><div class="kt">${c.t}</div><div class="kd">${c.d}${n}</div></div>${I.arrow}</button>`);
    row.onclick=()=>{ userMsg(c.t); typing(()=> c.id==='dokumenty'?flowChecklist():showCat(c.id)); };
    wrap.appendChild(row);
  });
  scroll();
}
function showCat(catId){
  const c=CATS.find(x=>x.id===catId);
  const items=KB.filter(k=>k.cat===catId);
  botMsg(`<b>${c.t}</b> — vyberte tému:`);
  chipRow(items.map(k=>({t:k.title,fn:()=>openTopic(k.id)})).concat([{t:'Späť na oblasti',fn:flowKB}]));
}
function openTopic(id){
  const k=KB.find(x=>x.id===id); if(!k)return;
  botMsg(`<div class="panel"><div class="panel-h"><span class="pin"></span>${k.title}</div><div class="panel-b" style="font:500 13px/1.55 var(--font);color:var(--ink-3)">${k.body}</div></div>`);
  if(k.rel&&k.rel.length) setTimeout(()=>chipRow(resolveRel(k.rel)),260);
}
function resolveRel(rel){
  const acts={
    need:{t:'Zistiť, čo potrebujem',ic:I.search,fn:flowNeed},
    steps:{t:'Postup pri povolení',ic:I.steps,fn:flowSteps},
    letter:{t:'Vytvoriť správu na úrad',ic:I.mail,fn:flowLetter},
    pkg:{t:'Projektový štartovací balík',ic:I.pkg,fn:flowPackage},
    cal:{t:'Rezervovať konzultáciu',ic:I.cal,fn:flowCalendar},
    checklist:{t:'Checklist dokumentov',ic:I.list,fn:()=>flowChecklist()},
    lead:{t:'Poslať dopyt',ic:I.send,fn:flowLead}
  };
  const out=[];
  rel.forEach(r=>{
    if(r.startsWith('topic:')){const k=KB.find(x=>x.id===r.slice(6));if(k)out.push({t:k.title,fn:()=>openTopic(k.id)});}
    else if(r.startsWith('act:')){const a=acts[r.slice(4)];if(a)out.push(a);}
  });
  out.push({t:'Témy',fn:flowKB});
  return out;
}
function searchKB(q){
  const s=q.toLowerCase().trim();
  if(s.length<2) return [];
  const words=s.split(/\s+/);
  return KB.map(k=>{
    const hay=(k.title+' '+k.tags+' '+k.cat).toLowerCase();
    let score=0;
    words.forEach(w=>{ if(hay.includes(w)) score+= k.title.toLowerCase().includes(w)?3:1; });
    return {k,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,6).map(x=>x.k);
}

/* ============ jednoduchý "free text" — vyhľadávanie + scenár ============ */
function aiUserSend(){
  const t=input.value.trim(); if(!t)return;
  input.value='';userMsg(t);
  const s=t.toLowerCase();
  typing(()=>{
    const hits=searchKB(s);
    if(hits.length){
      if(hits.length===1){ openTopic(hits[0].id); return; }
      botMsg(`Našiel som ${hits.length} tém k „<b>${esc(t)}</b>". Vyberte, čo sedí:`);
      chipRow(hits.map(k=>({t:k.title,fn:()=>openTopic(k.id)})).concat([{t:'Prehľadať všetky témy',ic:I.book,fn:flowKB}]));
      return;
    }
    if(/termín|termin|konzult|stretnut|kalend|rezerv/.test(s)){ flowCalendar(); return; }
    if(/správ|sprav|napís|napis|e-?mail.*úrad|list úradu/.test(s)){ flowLetter(); return; }
    if(/dopyt|kontakt|ozvite|zavolaj/.test(s)){ flowLead(); return; }
    if(/balík|balik|štartov|startov/.test(s)){ flowPackage(); return; }
    if(/chýbaj|chybaj|checklist/.test(s)){ topic('dok'); return; }
    botMsg('Túto konkrétnu vec nemám v prehľade, ale rád vás nasmerujem. Skúste iné slovo, prejdite si témy, alebo pošlite dopyt a ozve sa vám projektant.');
    setTimeout(()=>chipRow([
      {t:'Prehľadať témy a otázky',ic:I.book,primary:true,fn:flowKB},
      {t:'Zistiť, čo potrebujem',ic:I.search,fn:flowNeed},
      {t:'Poslať dopyt',ic:I.send,fn:flowLead}
    ]),200);
  });
}
input.addEventListener('keydown',e=>{if(e.key==='Enter')aiUserSend();});

/* ——— animovaný placeholder v inpute (jemný typewriter) ——— */
const phPhrases=[
  'Čo potrebujem k stavebnému povoleniu?',
  'Viete mi vysvetliť postup pri komunikácii s úradom?',
  'Aké podklady si mám pripraviť?',
  'Dá sa objednať konzultácia?'
];
let phI=0,phChar=0,phDir=1;
function phTick(){
  if(document.activeElement===input || input.value){ input.placeholder='Napíšte správu…'; return setTimeout(phTick,1000); }
  const full=phPhrases[phI];
  phChar+=phDir;
  input.placeholder=full.slice(0,Math.max(0,phChar))+(phChar<full.length&&phChar>0?'│':'');
  if(phChar>=full.length){ phDir=-1; return setTimeout(phTick,1800); }
  if(phChar<=0){ phDir=1; phI=(phI+1)%phPhrases.length; return setTimeout(phTick,360); }
  setTimeout(phTick, phDir>0?52:26);
}
setTimeout(phTick,1500);

/* ——— teaser po krátkej chvíli ——— */
setTimeout(aiTeaserShow,2600);
